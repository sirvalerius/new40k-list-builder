server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # gzip for text assets
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # Never cache the service worker or the HTML entry (so updates ship fast).
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Long-cache fingerprinted build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Faction/rules JSON: revalidate but allow short caching.
    location /data/ {
        add_header Cache-Control "public, max-age=3600";
    }

    # SPA fallback — every unknown route returns the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
