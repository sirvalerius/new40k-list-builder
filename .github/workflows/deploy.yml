name: CI & Deploy

# CI (lint-free build + tests) runs on every push and pull request — so feature branches
# with descriptive names are validated before merge. Production is deployed to GitHub Pages
# only from the main branch.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

  deploy:
    name: Deploy to GitHub Pages
    # only the main branch publishes the live site testers use
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build (with Pages sub-path)
        run: npm run build
        env:
          VITE_BASE: /new40k-list-builder/
          # set once after deploying the feedback Worker (repo → Settings →
          # Variables → Actions → FEEDBACK_URL). Empty = feedback button hidden.
          VITE_FEEDBACK_URL: ${{ vars.FEEDBACK_URL }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
